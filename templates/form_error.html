<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エラー | 神大ライフハック</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-red-50 to-orange-100 min-h-screen flex items-center justify-center px-4">
  <div class="max-w-sm w-full">
    <div class="bg-white rounded-3xl shadow-sm p-8 text-center">
      <div class="text-6xl mb-4">😢</div>
      <h1 class="text-xl font-bold text-gray-800 mb-2">送信できませんでした</h1>
      <p class="text-red-500 text-sm mb-8">{{ message }}</p>
      <button onclick="history.back()"
        class="block w-full bg-indigo-600 text-white font-bold py-3 rounded-2xl hover:bg-indigo-700 transition text-sm">
        ← 入力画面に戻る
      </button>
    </div>
  </div>
</body>
</html>
