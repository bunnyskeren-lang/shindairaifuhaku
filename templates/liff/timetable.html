<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時間割登録</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
  background: {% if IS_DEV %}#fff7ed{% else %}#f3f4f6{% endif %};
  color: #1f2937; min-height: 100vh; overflow-x: hidden;
}

.header {
  background: linear-gradient(135deg, {% if IS_DEV %}#ea580c, #fb923c{% else %}#6366f1, #818cf8{% endif %});
  color: #fff; padding: 16px; position: sticky; top: 0; z-index: 10;
}
.header h1 { font-size: 18px; font-weight: 700; }
.header p  { font-size: 12px; color: rgba(255,255,255,.75); margin-top: 2px; }

.dev-banner {
  background: #ea580c; color: #fff;
  text-align: center; padding: 6px; font-size: 13px; font-weight: bold;
}

/* ── 時間割グリッド ── */
.grid-wrap { overflow-x: auto; padding: 12px; }
table { border-collapse: collapse; width: 100%; min-width: 320px; }
th, td { border: 1px solid #e2e8f0; text-align: center; vertical-align: middle; }

thead th {
  background: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  color: #fff; font-size: 13px; font-weight: 700;
  padding: 8px 4px; width: 18%;
}
thead th:first-child { width: 10%; background: {% if IS_DEV %}#c2410c{% else %}#4f46e5{% endif %}; }

tbody td:first-child {
  background: {% if IS_DEV %}#fff7ed{% else %}#eef2ff{% endif %};
  color: {% if IS_DEV %}#c2410c{% else %}#4f46e5{% endif %};
  font-size: 12px; font-weight: 700; padding: 4px;
}

.cell {
  padding: 6px 4px; min-height: 56px; cursor: pointer;
  background: #fff; transition: background .15s;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px;
}
.cell:active { background: #f1f5f9; }
.cell.has-course { background: {% if IS_DEV %}#fff7ed{% else %}#eef2ff{% endif %}; }

.cell-name {
  font-size: 10px; font-weight: 600; line-height: 1.3;
  color: {% if IS_DEV %}#9a3412{% else %}#4338ca{% endif %};
  word-break: break-all; max-width: 100%;
}
.cell-plus {
  font-size: 20px; color: #cbd5e1;
}
.cell-count {
  font-size: 9px; color: #94a3b8;
}

/* ── ドロワー ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 100;
}
.overlay.open { display: block; }

.drawer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-radius: 16px 16px 0 0;
  max-height: 75vh; display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform .25s ease;
  z-index: 101;
}
.drawer.open { transform: translateY(0); }

.drawer-handle {
  width: 36px; height: 4px; background: #e2e8f0;
  border-radius: 2px; margin: 12px auto 0;
}
.drawer-header {
  padding: 12px 16px 8px;
  border-bottom: 1px solid #f1f5f9;
}
.drawer-title { font-size: 15px; font-weight: 700; color: #1e293b; }
.drawer-sub   { font-size: 12px; color: #94a3b8; margin-top: 2px; }

.filter-row {
  display: flex; gap: 6px; padding: 8px 16px;
  border-bottom: 1px solid #f1f5f9;
}
.filter-btn {
  font-size: 12px; padding: 4px 12px; border-radius: 999px;
  border: 1px solid #e2e8f0; background: #fff; cursor: pointer;
  color: #64748b; transition: all .15s;
}
.filter-btn.active {
  background: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  border-color: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  color: #fff;
}

.course-list { overflow-y: auto; flex: 1; padding: 8px 0 20px; }

.course-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid #f8fafc;
}
.course-info { flex: 1; min-width: 0; }
.course-name { font-size: 13px; font-weight: 600; color: #1e293b; }
.course-meta { font-size: 11px; color: #94a3b8; margin-top: 2px; }

.reg-btn {
  flex-shrink: 0; font-size: 12px; font-weight: 600;
  padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer;
  transition: all .15s;
}
.reg-btn.register {
  background: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  color: #fff;
}
.reg-btn.unregister {
  background: #f1f5f9; color: #64748b;
}
.reg-btn:disabled { opacity: .5; cursor: default; }

.empty-msg {
  text-align: center; padding: 32px 16px;
  color: #94a3b8; font-size: 13px;
}

/* ── クォーターバー ── */
.quarter-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; background: #fff;
  border-bottom: 1px solid #e2e8f0;
}
.year-label {
  font-size: 12px; font-weight: 600; color: #64748b; margin-right: 4px;
}
.q-btn {
  font-size: 13px; font-weight: 600; padding: 6px 18px;
  border-radius: 999px; border: none; cursor: pointer;
  background: #f1f5f9; color: #64748b; transition: all .15s;
}
.q-btn.active {
  background: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  color: #fff;
}

/* ── 集中講義セクション ── */
.intensive-wrap {
  padding: 12px 12px 20px;
  border-top: 2px solid #e2e8f0;
}
.intensive-header {
  font-size: 14px; font-weight: 700;
  color: {% if IS_DEV %}#c2410c{% else %}#4f46e5{% endif %};
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.intensive-add-btn {
  margin-left: auto; font-size: 11px; font-weight: 600;
  padding: 4px 12px; border-radius: 999px; border: none; cursor: pointer;
  background: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %}; color: #fff;
}
.intensive-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
  background: {% if IS_DEV %}#fff7ed{% else %}#eef2ff{% endif %};
  cursor: pointer; transition: opacity .15s;
}
.intensive-item:active { opacity: .7; }
.intensive-item-info { flex: 1; min-width: 0; }
.intensive-item-name {
  font-size: 13px; font-weight: 600;
  color: {% if IS_DEV %}#9a3412{% else %}#4338ca{% endif %};
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.intensive-item-meta { font-size: 11px; color: #94a3b8; margin-top: 2px; }
.intensive-empty {
  font-size: 12px; color: #94a3b8; padding: 8px 0;
}

#loading-screen {
  position: fixed; inset: 0; background: #fff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; z-index: 200;
}
#loading-screen p { color: #94a3b8; font-size: 14px; }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid #e2e8f0;
  border-top-color: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

{% if IS_DEV %}<div class="dev-banner">🚧 開発環境</div>{% endif %}

<div id="loading-screen">
  <div class="spinner"></div>
  <p>読み込み中...</p>
</div>

<div class="header">
  <h1>📅 時間割登録</h1>
  <p>セルをタップして科目を登録</p>
</div>

<div class="quarter-bar">
  <span class="year-label">2026年度</span>
  <button class="q-btn active" data-q="3" onclick="selectQuarter('3')">第3Q</button>
  <button class="q-btn" data-q="4" onclick="selectQuarter('4')">第4Q</button>
</div>

<div class="grid-wrap">
  <table id="timetable">
    <thead>
      <tr>
        <th></th>
        <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th>
      </tr>
    </thead>
    <tbody id="grid-body"></tbody>
  </table>
</div>

<div class="intensive-wrap">
  <div class="intensive-header">
    集中講義
    <button class="intensive-add-btn" onclick="openDrawer('集', 0)">＋ 追加</button>
  </div>
  <div id="intensive-list"></div>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-title" id="drawer-title"></div>
    <div class="drawer-sub" id="drawer-sub"></div>
  </div>
  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" data-q="all" onclick="setFilter('all')">すべて</button>
    <button class="filter-btn" data-q="3" onclick="setFilter('3')">第3Q</button>
    <button class="filter-btn" data-q="4" onclick="setFilter('4')">第4Q</button>
  </div>
  <div class="course-list" id="course-list"></div>
</div>

<script>
const BASE_URL = "{{ base_url }}";
const LIFF_ID  = "{{ liff_id }}";
const DAYS = ["月","火","水","木","金"];
const PERIODS = [1,2,3,4,5,6];

let userId = "";
let myCourseIds = new Set();
let drawerCourses = [];
let currentFilter = "all";
let currentSlot = null;
let currentQuarter = "3";

async function init() {
  try {
    {% if IS_DEV %}
    const devUid = new URLSearchParams(location.search).get("dev_uid");
    if (devUid) {
      userId = devUid;
      await loadMyCourses();
      buildGrid();
      document.getElementById("loading-screen").style.display = "none";
      return;
    }
    {% endif %}
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    userId = profile.userId;
    await loadMyCourses();
    buildGrid();
    document.getElementById("loading-screen").style.display = "none";
  } catch (e) {
    document.getElementById("loading-screen").innerHTML =
      `<p style="color:#ef4444;padding:16px;font-size:11px;word-break:break-all">
        code: ${e.code || '(none)'}<br>
        msg: ${e.message || '(none)'}<br>
        str: ${String(e)}<br>
        json: ${JSON.stringify(e)}
      </p>`;
  }
}

async function loadMyCourses() {
  const res = await fetch(`${BASE_URL}/api/timetable/my?user_id=${encodeURIComponent(userId)}`);
  const data = await res.json();
  myCourseIds = new Set(data.courses.map(c => c.id));
  window._myCourses = {};
  window._myIntensiveCourses = [];
  for (const c of data.courses) {
    for (const s of c.slots) {
      if (s.day === "集") {
        if (!window._myIntensiveCourses.find(x => x.id === c.id)) {
          window._myIntensiveCourses.push(c);
        }
      } else {
        const key = `${s.day}-${s.period}`;
        if (!window._myCourses[key]) window._myCourses[key] = [];
        window._myCourses[key].push(c);
      }
    }
  }
}

function selectQuarter(q) {
  currentQuarter = q;
  document.querySelectorAll(".q-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.q === q);
  });
  buildGrid();
}

function buildGrid() {
  const tbody = document.getElementById("grid-body");
  tbody.innerHTML = "";
  for (const p of PERIODS) {
    const tr = document.createElement("tr");
    const th = document.createElement("td");
    th.textContent = `${p}限`;
    tr.appendChild(th);
    for (const day of DAYS) {
      const td = document.createElement("td");
      const div = document.createElement("div");
      div.className = "cell";
      div.dataset.day = day;
      div.dataset.period = p;
      div.onclick = () => openDrawer(day, p);
      tr.appendChild(td);
      td.appendChild(div);
      updateCell(div, day, p);
    }
    tbody.appendChild(tr);
  }
  updateIntensiveSection();
}

function updateIntensiveSection() {
  const list = document.getElementById("intensive-list");
  list.innerHTML = "";
  const courses = (window._myIntensiveCourses || []).filter(c => {
    if (!c.term) return false;
    if (c.term.startsWith("第" + currentQuarter)) return true;
    if (c.term === "後期" && (currentQuarter === "3" || currentQuarter === "4")) return true;
    return false;
  });
  if (courses.length === 0) {
    list.innerHTML = '<div class="intensive-empty">登録中の集中講義はありません</div>';
    return;
  }
  for (const c of courses) {
    const div = document.createElement("div");
    div.className = "intensive-item";
    div.onclick = () => openDrawer("集", 0);
    const info = document.createElement("div");
    info.className = "intensive-item-info";
    info.innerHTML = `
      <div class="intensive-item-name">${esc(c.name)}</div>
      <div class="intensive-item-meta">${esc(c.instructor)} ／ ${esc(c.term)}</div>
    `;
    div.appendChild(info);
    list.appendChild(div);
  }
}

function updateCell(div, day, period) {
  const key = `${day}-${period}`;
  const courses = ((window._myCourses || {})[key] || []).filter(c => {
    if (!c.term) return false;
    if (c.term.startsWith("第" + currentQuarter)) return true;
    if (c.term === "後期" && (currentQuarter === "3" || currentQuarter === "4")) return true;
    return false;
  });
  div.innerHTML = "";
  if (courses.length > 0) {
    div.classList.add("has-course");
    const nameDiv = document.createElement("div");
    nameDiv.className = "cell-name";
    nameDiv.textContent = courses[0].name.length > 8
      ? courses[0].name.slice(0, 8) + "…"
      : courses[0].name;
    div.appendChild(nameDiv);
    if (courses.length > 1) {
      const cnt = document.createElement("div");
      cnt.className = "cell-count";
      cnt.textContent = `他${courses.length - 1}件`;
      div.appendChild(cnt);
    }
  } else {
    div.classList.remove("has-course");
    const plus = document.createElement("div");
    plus.className = "cell-plus";
    plus.textContent = "+";
    div.appendChild(plus);
  }
}

async function openDrawer(day, period) {
  currentSlot = { day, period };
  const dayLabel = day === "集" ? "集中講義" : `${day}曜${period}限`;
  document.getElementById("drawer-title").textContent = dayLabel;
  document.getElementById("drawer-sub").textContent = "読み込み中...";
  document.getElementById("course-list").innerHTML = "";

  document.getElementById("overlay").classList.add("open");
  document.getElementById("drawer").classList.add("open");

  const res = await fetch(
    `${BASE_URL}/api/timetable/slots/${encodeURIComponent(day)}/${period}?user_id=${encodeURIComponent(userId)}`
  );
  const data = await res.json();
  drawerCourses = data.courses;

  const count = drawerCourses.length;
  document.getElementById("drawer-sub").textContent = `${count}科目`;
  setFilter(currentQuarter);
}

function closeDrawer() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("drawer").classList.remove("open");
}

function setFilter(q) {
  currentFilter = q;
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.q === q);
  });
  const filtered = drawerCourses.filter(c => {
    if (q === "all") return true;
    return c.timetable_code.startsWith(q);
  });
  renderCourseList(filtered);
}

function renderCourseList(courses) {
  const list = document.getElementById("course-list");
  list.innerHTML = "";
  if (courses.length === 0) {
    list.innerHTML = '<div class="empty-msg">この時間に科目がありません</div>';
    return;
  }
  for (const c of courses) {
    const item = document.createElement("div");
    item.className = "course-item";
    item.dataset.id = c.id;

    const info = document.createElement("div");
    info.className = "course-info";
    info.innerHTML = `
      <div class="course-name">${esc(c.name)}</div>
      <div class="course-meta">${esc(c.instructor)} ／ ${esc(c.term)}</div>
    `;

    const btn = document.createElement("button");
    btn.className = `reg-btn ${c.registered ? "unregister" : "register"}`;
    btn.textContent = c.registered ? "登録済" : "登録";
    btn.dataset.courseId = c.id;
    btn.dataset.registered = c.registered ? "1" : "0";
    btn.onclick = () => toggleRegister(btn, c);

    item.appendChild(info);
    item.appendChild(btn);
    list.appendChild(item);
  }
}

async function toggleRegister(btn, course) {
  btn.disabled = true;
  const isRegistered = btn.dataset.registered === "1";
  try {
    if (isRegistered) {
      await fetch(`${BASE_URL}/api/timetable/register/${course.id}?user_id=${encodeURIComponent(userId)}`, {
        method: "DELETE"
      });
      btn.dataset.registered = "0";
      btn.className = "reg-btn register";
      btn.textContent = "登録";
      course.registered = false;
      myCourseIds.delete(course.id);
    } else {
      await fetch(`${BASE_URL}/api/timetable/register/${course.id}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId }),
      });
      btn.dataset.registered = "1";
      btn.className = "reg-btn unregister";
      btn.textContent = "登録済";
      course.registered = true;
      myCourseIds.add(course.id);
    }
    await loadMyCourses();
    updateIntensiveSection();
    if (currentSlot && currentSlot.day !== "集") {
      const div = document.querySelector(
        `.cell[data-day="${currentSlot.day}"][data-period="${currentSlot.period}"]`
      );
      if (div) updateCell(div, currentSlot.day, currentSlot.period);
    }
  } catch (e) {
    alert("エラーが発生しました。再度お試しください。");
  } finally {
    btn.disabled = false;
  }
}

function esc(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

init();
</script>
</body>
</html>
