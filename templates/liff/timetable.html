<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時間割登録</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
  background: {% if IS_DEV %}#fff7ed{% else %}#f3f4f6{% endif %};
  color: #1f2937; min-height: 100vh; overflow-x: hidden;
}

.header {
  background: linear-gradient(135deg, {% if IS_DEV %}#ea580c, #fb923c{% else %}#6366f1, #818cf8{% endif %});
  color: #fff; padding: 16px; position: sticky; top: 0; z-index: 10;
}
.header h1 { font-size: 18px; font-weight: 700; }
.header p  { font-size: 12px; color: rgba(255,255,255,.75); margin-top: 2px; }

.dev-banner {
  background: #ea580c; color: #fff;
  text-align: center; padding: 6px; font-size: 13px; font-weight: bold;
}

/* ── 時間割グリッド ── */
.grid-wrap { overflow-x: auto; padding: 12px; }
table { border-collapse: collapse; width: 100%; min-width: 320px; }
th, td { border: 1px solid #e2e8f0; text-align: center; vertical-align: middle; }

thead th {
  background: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  color: #fff; font-size: 13px; font-weight: 700;
  padding: 8px 4px; width: 18%;
}
thead th:first-child { width: 10%; background: {% if IS_DEV %}#c2410c{% else %}#4f46e5{% endif %}; }

tbody td:first-child {
  background: {% if IS_DEV %}#fff7ed{% else %}#eef2ff{% endif %};
  color: {% if IS_DEV %}#c2410c{% else %}#4f46e5{% endif %};
  font-size: 12px; font-weight: 700; padding: 4px;
}

.cell {
  padding: 6px 4px; min-height: 56px; cursor: pointer;
  background: #fff; transition: background .15s;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px;
}
.cell:active { background: #f1f5f9; }
.cell.has-course { background: {% if IS_DEV %}#fff7ed{% else %}#eef2ff{% endif %}; }

.cell-name {
  font-size: 10px; font-weight: 600; line-height: 1.3;
  color: {% if IS_DEV %}#9a3412{% else %}#4338ca{% endif %};
  word-break: break-all; max-width: 100%;
}
.cell-plus {
  font-size: 20px; color: #cbd5e1;
}
.cell-count {
  font-size: 9px; color: #94a3b8;
}

/* ── ドロワー ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 100;
}
.overlay.open { display: block; }

.drawer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-radius: 16px 16px 0 0;
  max-height: 75vh; display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform .25s ease;
  z-index: 101;
}
.drawer.open { transform: translateY(0); }

.drawer-handle {
  width: 36px; height: 4px; background: #e2e8f0;
  border-radius: 2px; margin: 12px auto 0;
}
.drawer-header {
  padding: 12px 16px 8px;
  border-bottom: 1px solid #f1f5f9;
}
.drawer-title { font-size: 15px; font-weight: 700; color: #1e293b; }
.drawer-sub   { font-size: 12px; color: #94a3b8; margin-top: 2px; }

.filter-row {
  display: flex; gap: 6px; padding: 8px 16px;
  border-bottom: 1px solid #f1f5f9;
}
.filter-btn {
  font-size: 12px; padding: 4px 12px; border-radius: 999px;
  border: 1px solid #e2e8f0; background: #fff; cursor: pointer;
  color: #64748b; transition: all .15s;
}
.filter-btn.active {
  background: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  border-color: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  color: #fff;
}

.course-list { overflow-y: auto; flex: 1; padding: 8px 0 20px; }

.course-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid #f8fafc;
}
.course-info { flex: 1; min-width: 0; }
.course-name { font-size: 13px; font-weight: 600; color: #1e293b; }
.course-meta { font-size: 11px; color: #94a3b8; margin-top: 2px; }

.reg-btn {
  flex-shrink: 0; font-size: 12px; font-weight: 600;
  padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer;
  transition: all .15s;
}
.reg-btn.register {
  background: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  color: #fff;
}
.reg-btn.unregister {
  background: #f1f5f9; color: #64748b;
}
.reg-btn:disabled { opacity: .5; cursor: default; }

.empty-msg {
  text-align: center; padding: 32px 16px;
  color: #94a3b8; font-size: 13px;
}

.course-section-header {
  font-size: 11px; font-weight: 700;
  color: {% if IS_DEV %}#c2410c{% else %}#4f46e5{% endif %};
  background: {% if IS_DEV %}#fff7ed{% else %}#eef2ff{% endif %};
  padding: 6px 16px; letter-spacing: .04em;
  border-top: 1px solid #e2e8f0;
  position: sticky; top: 0;
}

/* ── クォーターバー ── */
.quarter-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; background: #fff;
  border-bottom: 1px solid #e2e8f0;
}
.year-label {
  font-size: 12px; font-weight: 600; color: #64748b; margin-right: 4px;
}
.q-btn {
  font-size: 13px; font-weight: 600; padding: 6px 18px;
  border-radius: 999px; border: none; cursor: pointer;
  background: #f1f5f9; color: #64748b; transition: all .15s;
}
.q-btn.active {
  background: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  color: #fff;
}

/* ── 集中講義セクション ── */
.intensive-wrap {
  padding: 12px 12px 20px;
  border-top: 2px solid #e2e8f0;
}
.intensive-header {
  font-size: 14px; font-weight: 700;
  color: {% if IS_DEV %}#c2410c{% else %}#4f46e5{% endif %};
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.intensive-add-btn {
  margin-left: auto; font-size: 11px; font-weight: 600;
  padding: 4px 12px; border-radius: 999px; border: none; cursor: pointer;
  background: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %}; color: #fff;
}
.intensive-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
  background: {% if IS_DEV %}#fff7ed{% else %}#eef2ff{% endif %};
  cursor: pointer; transition: opacity .15s;
}
.intensive-item:active { opacity: .7; }
.intensive-item-info { flex: 1; min-width: 0; }
.intensive-item-name {
  font-size: 13px; font-weight: 600;
  color: {% if IS_DEV %}#9a3412{% else %}#4338ca{% endif %};
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.intensive-item-meta { font-size: 11px; color: #94a3b8; margin-top: 2px; }
.intensive-empty {
  font-size: 12px; color: #94a3b8; padding: 8px 0;
}

#loading-screen {
  position: fixed; inset: 0; background: #fff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; z-index: 200;
}
#loading-screen p { color: #94a3b8; font-size: 14px; }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid #e2e8f0;
  border-top-color: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── プロフィールチップ ── */
.profile-chip {
  margin-left: auto; font-size: 11px; font-weight: 600;
  padding: 5px 10px; border-radius: 999px;
  border: 1px solid #e2e8f0; background: #fff;
  color: #64748b; cursor: pointer; white-space: nowrap; transition: all .15s;
}
.profile-chip.has-profile {
  background: {% if IS_DEV %}#fff7ed{% else %}#eef2ff{% endif %};
  border-color: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  color: {% if IS_DEV %}#9a3412{% else %}#4338ca{% endif %};
}

/* ── プロフィールモーダル ── */
.profile-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 200; display: flex; align-items: flex-end;
}
.profile-modal {
  background: #fff; width: 100%;
  border-radius: 16px 16px 0 0; padding: 20px 20px 36px;
}
.profile-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.profile-modal-title { font-size: 16px; font-weight: 700; color: #1e293b; }
.profile-modal-close {
  width: 28px; height: 28px; border-radius: 50%;
  border: none; background: #f1f5f9; color: #64748b;
  font-size: 16px; cursor: pointer;
}
.profile-field { margin-bottom: 16px; }
.profile-label { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
.profile-select {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1px solid #e2e8f0; font-size: 14px; color: #1e293b;
  background: #f8fafc;
}
.grade-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.grade-opt input { display: none; }
.grade-opt label {
  display: block; text-align: center; padding: 8px; border-radius: 8px;
  border: 1px solid #e2e8f0; font-size: 13px; font-weight: 600;
  color: #64748b; cursor: pointer; transition: all .15s;
}
.grade-opt input:checked + label {
  background: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  border-color: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  color: #fff;
}
.profile-save-btn {
  width: 100%; padding: 12px; border-radius: 10px; border: none;
  background: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 20px;
}

/* ── シラバスリンク ── */
.syllabus-link {
  font-size: 10px; color: {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %};
  text-decoration: none; display: inline-block; margin-top: 3px;
}

/* ── 単位チェッカー ── */
.credits-wrap { display:none; padding:0 12px 24px; border-top:2px solid #e2e8f0; }
.credits-card { background:#fff; border-radius:12px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
.credits-title { font-size:14px; font-weight:700; color:#1e293b; margin-bottom:12px; }
.credits-group-header {
  font-size:10px; font-weight:700; letter-spacing:.05em;
  color:{% if IS_DEV %}#c2410c{% else %}#4f46e5{% endif %};
  background:{% if IS_DEV %}#fff7ed{% else %}#eef2ff{% endif %};
  padding:3px 8px; margin:8px -4px 4px; border-radius:4px;
}
.credits-row-item {
  display:flex; align-items:center; gap:6px; padding:5px 0;
  border-bottom:1px solid #f8fafc;
}
.credits-cat-name { flex:1; font-size:11px; color:#374151; min-width:0; line-height:1.3; }
.credits-inputs { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.credits-mini-field { display:flex; flex-direction:column; align-items:center; gap:1px; }
.credits-mini-label { font-size:9px; color:#94a3b8; }
.credits-mini-input {
  width:40px; padding:4px 2px; border-radius:6px;
  border:1px solid #e2e8f0; font-size:13px; font-weight:700;
  text-align:center; color:#1e293b; background:#f8fafc;
}
.credits-mini-input:focus { outline:none; border-color:{% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %}; background:#fff; }
.credits-remain { width:26px; font-size:10px; font-weight:700; text-align:right; color:#cbd5e1; }
.credits-remain.done { color:#10b981; }
.credits-divider { height:1px; background:#f1f5f9; margin:10px 0 8px; }
.credits-total {
  display:flex; justify-content:space-between; align-items:baseline;
  font-size:12px; color:#64748b; margin-bottom:8px;
}
.credits-total strong { font-size:15px; font-weight:700; color:#1e293b; }
.credits-progress-wrap { background:#f1f5f9; border-radius:999px; height:8px; overflow:hidden; margin-bottom:6px; }
.credits-progress-bar {
  height:100%; border-radius:999px; width:0%;
  background:linear-gradient(90deg, {% if IS_DEV %}#ea580c{% else %}#6366f1{% endif %}, {% if IS_DEV %}#fb923c{% else %}#818cf8{% endif %});
  transition:width .4s ease;
}
.credits-summary { font-size:11px; color:#94a3b8; text-align:center; }
</style>
</head>
<body>

{% if IS_DEV %}<div class="dev-banner">🚧 開発環境</div>{% endif %}

<div id="loading-screen">
  <div class="spinner"></div>
  <p>読み込み中...</p>
</div>

<div class="header">
  <h1>📅 時間割登録</h1>
  <p>セルをタップして科目を登録</p>
</div>

<div class="quarter-bar">
  <span class="year-label">2026年度</span>
  <button class="q-btn active" data-q="3" onclick="selectQuarter('3')">第3Q</button>
  <button class="q-btn" data-q="4" onclick="selectQuarter('4')">第4Q</button>
  <button class="profile-chip" id="profile-chip" onclick="openProfileModal()">👤 未設定</button>
</div>

<div class="grid-wrap">
  <table id="timetable">
    <thead>
      <tr>
        <th></th>
        <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th>
      </tr>
    </thead>
    <tbody id="grid-body"></tbody>
  </table>
</div>

<div class="intensive-wrap">
  <div class="intensive-header">
    集中講義
    <button class="intensive-add-btn" onclick="openDrawer('集', 0)">＋ 追加</button>
  </div>
  <div id="intensive-list"></div>
</div>

<div class="credits-wrap" id="credits-wrap">
  <div class="credits-card">
    <div class="credits-title">📊 単位チェッカー</div>
    <div id="credits-rows"></div>
    <div class="credits-divider"></div>
    <div class="credits-total">
      <span>合計</span>
      <span><strong id="credits-total-earned">0</strong> / <span id="credits-total-req">0</span> 単位</span>
    </div>
    <div class="credits-progress-wrap">
      <div class="credits-progress-bar" id="credits-bar"></div>
    </div>
    <div class="credits-summary" id="credits-summary"></div>
  </div>
</div>

<div class="profile-modal-overlay" id="profile-modal-overlay" style="display:none" onclick="closeProfileModalOnOverlay(event)">
  <div class="profile-modal">
    <div class="profile-modal-header">
      <span class="profile-modal-title">プロフィール設定</span>
      <button class="profile-modal-close" onclick="closeProfileModal()">×</button>
    </div>
    <div class="profile-field">
      <div class="profile-label">学部</div>
      <select class="profile-select" id="profile-faculty-sel">
        <option value="">選択してください</option>
        <option value="文学部">文学部</option>
        <option value="国際人間科学部">国際人間科学部</option>
        <option value="法学部">法学部</option>
        <option value="経済学部">経済学部</option>
        <option value="経営学部">経営学部</option>
        <option value="理学部">理学部</option>
        <option value="医学部">医学部</option>
        <option value="工学部">工学部</option>
        <option value="農学部">農学部</option>
        <option value="海事科学部">海事科学部</option>
      </select>
    </div>
    <div class="profile-field">
      <div class="profile-label">学年</div>
      <div class="grade-grid">
        <div class="grade-opt"><input type="radio" id="g1" name="prof-grade" value="1"><label for="g1">1年</label></div>
        <div class="grade-opt"><input type="radio" id="g2" name="prof-grade" value="2"><label for="g2">2年</label></div>
        <div class="grade-opt"><input type="radio" id="g3" name="prof-grade" value="3"><label for="g3">3年</label></div>
        <div class="grade-opt"><input type="radio" id="g4" name="prof-grade" value="4"><label for="g4">4年</label></div>
      </div>
    </div>
    <button class="profile-save-btn" onclick="submitProfile()">保存</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-title" id="drawer-title"></div>
    <div class="drawer-sub" id="drawer-sub"></div>
  </div>
  <div class="filter-row" id="filter-row" style="display:none"></div>
  <div class="course-list" id="course-list"></div>
</div>

<script>
const BASE_URL = "{{ base_url }}";
const LIFF_ID  = "{{ liff_id }}";
const CREDIT_CATS = [
  { id:'kyoyo_kei',   group:'教養科目',  name:'系科目（人文・自然・社会・総合）', def:12 },
  { id:'kyoyo_kiban', group:'教養科目',  name:'基盤系',                          def:4  },
  { id:'gaigo1',      group:'教養科目',  name:'外国語第1',                       def:4  },
  { id:'gaigo2',      group:'教養科目',  name:'外国語第2',                       def:4  },
  { id:'kyotsu',      group:'共通専門',  name:'共通専門基礎科目',               def:6  },
  { id:'shonen',      group:'専門科目',  name:'初年次セミナー',                 def:1  },
  { id:'senmon1',     group:'専門科目',  name:'第1群科目',                      def:6  },
  { id:'senmon2',     group:'専門科目',  name:'第2群科目',                      def:12 },
  { id:'global',      group:'専門科目',  name:'グローバル科目群',               def:4  },
  { id:'senmon3',     group:'専門科目',  name:'第3群・その他',                  def:0  },
];
let _creditData = {};
const DAYS = ["月","火","水","木","金"];
const PERIODS = [1,2,3,4,5,6];
const PERIOD_TIMES = {
  1: "8:50〜10:20",
  2: "10:40〜12:10",
  3: "13:20〜14:50",
  4: "15:10〜16:40",
  5: "17:00〜18:30",
  6: "18:50〜20:20",
};
const FACULTY_PATH_JS = { 'U': '20', 'B': '06' };

let userId = "";
let myCourseIds = new Set();
let drawerCourses = [];
let currentFilter = "all";
let currentSlot = null;
let currentQuarter = localStorage.getItem('currentQuarter') || "3";

function makeSyllabusUrl(code) {
  if (!code || code.length < 2) return null;
  const path = FACULTY_PATH_JS[code[1].toUpperCase()];
  if (!path) return null;
  return `https://kym22-web.ofc.kobe-u.ac.jp/kobe_syllabus/2026/${path}/data/2026_${code}.html`;
}

window._userProfile = { faculty: null, grade: null };

async function loadProfile() {
  const cached = localStorage.getItem('timetable_profile');
  if (cached) {
    try { window._userProfile = JSON.parse(cached); } catch(e) {}
  }
  updateProfileChip();
  if (!userId) return;
  try {
    const res = await fetch(`${BASE_URL}/api/timetable/profile?user_id=${encodeURIComponent(userId)}`);
    const data = await res.json();
    if (data.faculty !== undefined || data.grade !== undefined) {
      window._userProfile = { faculty: data.faculty, grade: data.grade };
      localStorage.setItem('timetable_profile', JSON.stringify(window._userProfile));
      updateProfileChip();
    }
  } catch(e) {}
}

function updateProfileChip() {
  const chip = document.getElementById('profile-chip');
  if (!chip) return;
  const p = window._userProfile || {};
  if (p.faculty || p.grade) {
    const label = [p.faculty || '', p.grade ? `${p.grade}年` : ''].filter(Boolean).join(' ');
    chip.textContent = `👤 ${label}`;
    chip.classList.add('has-profile');
  } else {
    chip.textContent = '👤 未設定';
    chip.classList.remove('has-profile');
  }
}

function openProfileModal() {
  const p = window._userProfile || {};
  document.getElementById('profile-faculty-sel').value = p.faculty || '';
  document.querySelectorAll('input[name="prof-grade"]').forEach(r => {
    r.checked = String(r.value) === String(p.grade);
  });
  document.getElementById('profile-modal-overlay').style.display = 'flex';
}

function closeProfileModal() {
  document.getElementById('profile-modal-overlay').style.display = 'none';
}

function closeProfileModalOnOverlay(e) {
  if (e.target === document.getElementById('profile-modal-overlay')) closeProfileModal();
}

async function submitProfile() {
  const faculty = document.getElementById('profile-faculty-sel').value || null;
  const gradeEl = document.querySelector('input[name="prof-grade"]:checked');
  const grade = gradeEl ? parseInt(gradeEl.value) : null;
  window._userProfile = { faculty, grade };
  localStorage.setItem('timetable_profile', JSON.stringify(window._userProfile));
  updateProfileChip();
  updateCreditsVisibility();
  closeProfileModal();
  if (currentSlot) setFilter(currentQuarter);
  if (userId) {
    fetch(`${BASE_URL}/api/timetable/profile`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, faculty, grade }),
    }).catch(() => {});
  }
}

async function init() {
  // localStorage の Q 選択をボタンに反映
  document.querySelectorAll(".q-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.q === currentQuarter);
  });
  try {
    {% if IS_DEV %}
    const devUid = new URLSearchParams(location.search).get("dev_uid");
    if (devUid) {
      userId = devUid;
      await Promise.all([loadMyCourses(), loadProfile()]);
      loadCredits();
      updateCreditsVisibility();
      buildGrid();
      document.getElementById("loading-screen").style.display = "none";
      return;
    }
    {% endif %}
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    userId = profile.userId;
    await Promise.all([loadMyCourses(), loadProfile()]);
    loadCredits();
    updateCreditsVisibility();
    buildGrid();
    document.getElementById("loading-screen").style.display = "none";
  } catch (e) {
    document.getElementById("loading-screen").innerHTML =
      `<p style="color:#ef4444;padding:16px;font-size:11px;word-break:break-all">
        code: ${e.code || '(none)'}<br>
        msg: ${e.message || '(none)'}<br>
        str: ${String(e)}<br>
        json: ${JSON.stringify(e)}
      </p>`;
  }
}

async function loadMyCourses() {
  const res = await fetch(`${BASE_URL}/api/timetable/my?user_id=${encodeURIComponent(userId)}`);
  const data = await res.json();
  myCourseIds = new Set(data.courses.map(c => c.id));
  window._myCourses = {};
  window._myIntensiveCourses = [];
  for (const c of data.courses) {
    for (const s of c.slots) {
      if (s.day === "集") {
        if (!window._myIntensiveCourses.find(x => x.id === c.id)) {
          window._myIntensiveCourses.push(c);
        }
      } else {
        const key = `${s.day}-${s.period}`;
        if (!window._myCourses[key]) window._myCourses[key] = [];
        window._myCourses[key].push(c);
      }
    }
  }
}

function selectQuarter(q) {
  currentQuarter = q;
  localStorage.setItem('currentQuarter', q);
  document.querySelectorAll(".q-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.q === q);
  });
  buildGrid();
}

function buildGrid() {
  const tbody = document.getElementById("grid-body");
  tbody.innerHTML = "";
  for (const p of PERIODS) {
    const tr = document.createElement("tr");
    const th = document.createElement("td");
    th.innerHTML = `<div>${p}限</div><div style="font-size:7px;font-weight:400;color:#94a3b8;margin-top:1px;line-height:1.4;white-space:nowrap">${(PERIOD_TIMES[p]||'').replace('〜','<br>')}</div>`;
    tr.appendChild(th);
    for (const day of DAYS) {
      const td = document.createElement("td");
      const div = document.createElement("div");
      div.className = "cell";
      div.dataset.day = day;
      div.dataset.period = p;
      div.onclick = () => openDrawer(day, p);
      tr.appendChild(td);
      td.appendChild(div);
      updateCell(div, day, p);
    }
    tbody.appendChild(tr);
  }
  updateIntensiveSection();
}

function updateIntensiveSection() {
  const list = document.getElementById("intensive-list");
  list.innerHTML = "";
  const courses = (window._myIntensiveCourses || []).filter(c => {
    if (!c.term) return false;
    if (c.term.startsWith("第" + currentQuarter)) return true;
    if ((c.term === "後期" || c.term === "集中") && (currentQuarter === "3" || currentQuarter === "4")) return true;
    return false;
  });
  if (courses.length === 0) {
    list.innerHTML = '<div class="intensive-empty">登録中の集中講義はありません</div>';
    return;
  }
  for (const c of courses) {
    const div = document.createElement("div");
    div.className = "intensive-item";
    div.onclick = () => openDrawer("集", 0);
    const info = document.createElement("div");
    info.className = "intensive-item-info";
    info.innerHTML = `
      <div class="intensive-item-name">${esc(c.name)}</div>
      <div class="intensive-item-meta">${esc(c.instructor)} ／ ${esc(c.term)}</div>
    `;
    div.appendChild(info);
    list.appendChild(div);
  }
}

function updateCell(div, day, period) {
  const key = `${day}-${period}`;
  const courses = ((window._myCourses || {})[key] || []).filter(c => {
    if (!c.term) return false;
    if (c.term.startsWith("第" + currentQuarter)) return true;
    if (c.term === "後期" && (currentQuarter === "3" || currentQuarter === "4")) return true;
    return false;
  });
  div.innerHTML = "";
  if (courses.length > 0) {
    div.classList.add("has-course");
    const nameDiv = document.createElement("div");
    nameDiv.className = "cell-name";
    nameDiv.textContent = courses[0].name.length > 8
      ? courses[0].name.slice(0, 8) + "…"
      : courses[0].name;
    div.appendChild(nameDiv);
    if (courses.length > 1) {
      const cnt = document.createElement("div");
      cnt.className = "cell-count";
      cnt.textContent = `他${courses.length - 1}件`;
      div.appendChild(cnt);
    }
  } else {
    div.classList.remove("has-course");
    const plus = document.createElement("div");
    plus.className = "cell-plus";
    plus.textContent = "+";
    div.appendChild(plus);
  }
}

async function openDrawer(day, period) {
  currentSlot = { day, period };
  const dayLabel = day === "集" ? "集中講義" : `${day}曜${period}限`;
  document.getElementById("drawer-title").textContent = dayLabel;
  document.getElementById("drawer-sub").textContent = "読み込み中...";
  document.getElementById("course-list").innerHTML = "";

  document.getElementById("overlay").classList.add("open");
  document.getElementById("drawer").classList.add("open");

  const res = await fetch(
    `${BASE_URL}/api/timetable/slots/${encodeURIComponent(day)}/${period}?user_id=${encodeURIComponent(userId)}`
  );
  const data = await res.json();
  drawerCourses = data.courses;

  setFilter(currentQuarter);
}

function closeDrawer() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("drawer").classList.remove("open");
}

function setFilter(q) {
  currentFilter = q;
  const filtered = drawerCourses.filter(c => {
    if (q === "all") return true;
    if (!c.term) return false;
    if (c.term.startsWith("第" + q)) return true;
    if ((c.term === "後期" || c.term === "集中") && (q === "3" || q === "4")) return true;
    return false;
  });
  document.getElementById("drawer-sub").textContent = `${filtered.length}科目`;
  renderCourseList(filtered);
}

function makeCourseItem(c) {
  const item = document.createElement("div");
  item.className = "course-item";
  item.dataset.id = c.id;

  const info = document.createElement("div");
  info.className = "course-info";
  const sylUrl = makeSyllabusUrl(c.timetable_code);
  info.innerHTML = `
    <div class="course-name">${esc(c.name)}</div>
    <div class="course-meta">${esc(c.instructor)} ／ ${esc(c.term)}</div>
    ${sylUrl ? `<a href="${sylUrl}" target="_blank" class="syllabus-link">シラバス →</a>` : ''}
  `;

  const btn = document.createElement("button");
  btn.className = `reg-btn ${c.registered ? "unregister" : "register"}`;
  btn.textContent = c.registered ? "登録済" : "登録";
  btn.dataset.courseId = c.id;
  btn.dataset.registered = c.registered ? "1" : "0";
  btn.onclick = () => toggleRegister(btn, c);

  item.appendChild(info);
  item.appendChild(btn);
  return item;
}

function renderCourseList(courses) {
  const list = document.getElementById("course-list");
  list.innerHTML = "";

  const profile = window._userProfile || {};
  const userGrade = profile.grade ? parseInt(profile.grade) : null;
  const userFaculty = profile.faculty || null;

  // 学年フィルタ（target_grades が null の科目は表示する）
  let filtered = courses;
  if (userGrade) {
    filtered = courses.filter(c => {
      if (!c.target_grades) return true;
      return c.target_grades.split(',').map(Number).includes(userGrade);
    });
  }

  const kyoyo = filtered.filter(c => !c.department || !c.department.includes("経営学部"));
  let senmon = filtered.filter(c => c.department && c.department.includes("経営学部"));

  // 経営学部以外の学生には経営専門科目を非表示
  if (userFaculty && userFaculty !== "経営学部") {
    senmon = [];
  }

  if (kyoyo.length === 0 && senmon.length === 0) {
    list.innerHTML = '<div class="empty-msg">この時間に科目がありません</div>';
    return;
  }

  if (kyoyo.length > 0) {
    const h = document.createElement("div");
    h.className = "course-section-header";
    h.textContent = "教養科目";
    list.appendChild(h);
    kyoyo.forEach(c => list.appendChild(makeCourseItem(c)));
  }

  if (senmon.length > 0) {
    const h = document.createElement("div");
    h.className = "course-section-header";
    h.textContent = "経営学部専門科目";
    list.appendChild(h);
    senmon.forEach(c => list.appendChild(makeCourseItem(c)));
  }
}

async function toggleRegister(btn, course) {
  btn.disabled = true;
  const isRegistered = btn.dataset.registered === "1";
  try {
    if (isRegistered) {
      await fetch(`${BASE_URL}/api/timetable/register/${course.id}?user_id=${encodeURIComponent(userId)}`, {
        method: "DELETE"
      });
      btn.dataset.registered = "0";
      btn.className = "reg-btn register";
      btn.textContent = "登録";
      course.registered = false;
      myCourseIds.delete(course.id);
    } else {
      await fetch(`${BASE_URL}/api/timetable/register/${course.id}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId }),
      });
      btn.dataset.registered = "1";
      btn.className = "reg-btn unregister";
      btn.textContent = "登録済";
      course.registered = true;
      myCourseIds.add(course.id);
    }
    await loadMyCourses();
    updateIntensiveSection();
    if (currentSlot && currentSlot.day !== "集") {
      const div = document.querySelector(
        `.cell[data-day="${currentSlot.day}"][data-period="${currentSlot.period}"]`
      );
      if (div) updateCell(div, currentSlot.day, currentSlot.period);
    }
  } catch (e) {
    alert("エラーが発生しました。再度お試しください。");
  } finally {
    btn.disabled = false;
  }
}

function loadCredits() {
  _creditData = JSON.parse(localStorage.getItem('credit_data') || '{}');
  renderCreditRows();
  updateCredits();
}

function renderCreditRows() {
  const container = document.getElementById('credits-rows');
  container.innerHTML = '';
  let lastGroup = null;
  CREDIT_CATS.forEach(cat => {
    if (cat.group !== lastGroup) {
      const hdr = document.createElement('div');
      hdr.className = 'credits-group-header';
      hdr.textContent = cat.group;
      container.appendChild(hdr);
      lastGroup = cat.group;
    }
    const req    = (_creditData[cat.id]?.required != null) ? _creditData[cat.id].required : cat.def;
    const earned = (_creditData[cat.id]?.earned   != null) ? _creditData[cat.id].earned   : 0;
    const row = document.createElement('div');
    row.className = 'credits-row-item';
    row.innerHTML = `
      <span class="credits-cat-name">${cat.name}</span>
      <div class="credits-inputs">
        <div class="credits-mini-field">
          <div class="credits-mini-label">必要</div>
          <input type="number" class="credits-mini-input" id="req-${cat.id}" min="0" max="200" value="${req}">
        </div>
        <div class="credits-mini-field">
          <div class="credits-mini-label">取得</div>
          <input type="number" class="credits-mini-input" id="earn-${cat.id}" min="0" max="200" value="${earned}">
        </div>
        <div class="credits-remain" id="remain-${cat.id}"></div>
      </div>
    `;
    container.appendChild(row);
    document.getElementById(`req-${cat.id}`).addEventListener('input', updateCredits);
    document.getElementById(`earn-${cat.id}`).addEventListener('input', updateCredits);
  });
}

function updateCredits() {
  let totalReq = 0, totalEarned = 0;
  CREDIT_CATS.forEach(cat => {
    const req    = parseInt(document.getElementById(`req-${cat.id}`)?.value)  || 0;
    const earned = parseInt(document.getElementById(`earn-${cat.id}`)?.value) || 0;
    const remainEl = document.getElementById(`remain-${cat.id}`);
    if (remainEl) {
      if (req === 0) {
        remainEl.textContent = ''; remainEl.className = 'credits-remain';
      } else if (earned >= req) {
        remainEl.textContent = '✓'; remainEl.className = 'credits-remain done';
      } else {
        remainEl.textContent = String(req - earned); remainEl.className = 'credits-remain';
      }
    }
    totalReq    += req;
    totalEarned += earned;
    if (!_creditData[cat.id]) _creditData[cat.id] = {};
    _creditData[cat.id].required = req;
    _creditData[cat.id].earned   = earned;
  });
  document.getElementById('credits-total-earned').textContent = totalEarned;
  document.getElementById('credits-total-req').textContent    = totalReq;
  const bar     = document.getElementById('credits-bar');
  const summary = document.getElementById('credits-summary');
  const pct     = totalReq > 0 ? Math.min(100, Math.round(totalEarned / totalReq * 100)) : 0;
  bar.style.width = pct + '%';
  const remaining = Math.max(0, totalReq - totalEarned);
  if (totalReq > 0 && remaining === 0) {
    bar.style.background = 'linear-gradient(90deg,#10b981,#34d399)';
    summary.textContent  = '✅ 必要単位すべて達成！';
  } else {
    bar.style.background = '';
    summary.textContent  = totalReq > 0 ? `あと ${remaining} 単位 · ${pct}%` : '';
  }
  localStorage.setItem('credit_data', JSON.stringify(_creditData));
}

function updateCreditsVisibility() {
  const wrap = document.getElementById('credits-wrap');
  if (!wrap) return;
  wrap.style.display = ((window._userProfile || {}).faculty === '経営学部') ? 'block' : 'none';
}

function esc(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

init();
</script>
