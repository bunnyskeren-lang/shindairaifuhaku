<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>管理者ログイン</title>
  <style>
    body{font-family:sans-serif;background:#f3f4f6;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
    .box{background:#fff;border-radius:12px;padding:32px 28px;width:100%;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
    h1{font-size:18px;font-weight:bold;color:#1f2937;margin:0 0 6px}
    p{font-size:13px;color:#6b7280;margin:0 0 24px}
    label{font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px}
    input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;box-sizing:border-box}
    input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px #eef2ff}
    button{width:100%;padding:11px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:16px}
    button:hover{background:#4f46e5}
    .error{background:#fef2f2;border:1px solid #fca5a5;color:#b91c1c;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:16px}
  </style>
</head>
<body>
  <div class="box">
    <h1>🔐 管理者ログイン</h1>
    <p>神大ライフハック 管理画面</p>
    {% if error %}
    <div class="error">パスワードが正しくありません</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <input type="hidden" name="next" value="{{ next }}">
      <label for="password">パスワード</label>
      <input type="password" name="password" id="password" autofocus required>
      <button type="submit">ログイン</button>
    </form>
  </div>
</body>
</html>
