<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>授業レビュー投稿 | 神大授業ナビ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen pb-16">

  <div class="max-w-md mx-auto px-4 pt-8">

    <div class="text-center mb-6">
      <div class="text-5xl mb-3">📚</div>
      <h1 class="text-2xl font-bold text-gray-800">授業レビューを投稿</h1>
      <p class="text-gray-500 text-sm mt-1">みんなの声が後輩の授業選びをサポート！</p>
    </div>

    <div class="bg-amber-50 border border-amber-200 rounded-2xl px-4 py-3 mb-5 text-sm text-amber-700 flex items-start gap-2">
      <span class="text-lg leading-none mt-0.5">✋</span>
      <span>送信後、内容を確認してから公開されます。</span>
    </div>

    <form id="reviewForm" action="/submit" method="post" novalidate class="space-y-4">

      <div class="bg-white rounded-2xl shadow-sm p-5">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          👤 お名前 <span class="text-red-500">*</span>
        </label>
        <input type="text" name="submitter_name" id="submitter_name"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
          placeholder="例：神大太郎" required maxlength="50">
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-5">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          📖 科目名 <span class="text-red-500">*</span>
        </label>
        <div class="relative">
          <input type="text" id="courseSearchInput"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
            placeholder="科目名を入力して検索..." autocomplete="off">
          <input type="hidden" name="course_name" id="courseNameHidden">
          <div id="courseDropdown"
            class="hidden absolute z-20 w-full mt-1 bg-white border border-gray-200 rounded-2xl shadow-xl overflow-hidden max-h-56 overflow-y-auto">
          </div>
        </div>
        <div id="selectedCourse" class="hidden mt-2 bg-green-50 border border-green-200 rounded-xl px-3 py-2 flex items-center gap-2 text-sm text-green-700">
          <span>✅</span>
          <span id="selectedCourseName" class="flex-1 font-medium"></span>
          <button type="button" id="clearCourse" class="text-xs text-gray-400 hover:text-gray-600 underline">変更</button>
        </div>
        <p id="courseError" class="hidden mt-1 text-red-500 text-xs">科目を選択または入力してください</p>
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-5">
        <label class="block text-sm font-semibold text-gray-700 mb-1">
          ⭐ 学びになった度 <span class="text-red-500">*</span>
        </label>
        <p class="text-xs text-gray-400 mb-4">1 = あまり学べなかった　　5 = めちゃくちゃ学べた</p>
        <div class="flex justify-center gap-2" id="starContainer"></div>
        <input type="hidden" name="rating" id="ratingHidden">
        <p id="ratingLabel" class="text-center text-sm text-gray-500 mt-3 min-h-5 font-medium"></p>
        <p id="ratingError" class="hidden mt-1 text-red-500 text-xs text-center">評価を選んでください</p>
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-5">
        <label class="block text-sm font-semibold text-gray-700 mb-1">
          😴 楽単度 <span class="text-red-500">*</span>
        </label>
        <p class="text-xs text-gray-400 mb-3">SS = 超楽　S = 楽　A = 普通　B = きつめ　C = 激ムズ</p>
        <div class="grid grid-cols-5 gap-2">
          <button type="button" class="ease-btn" data-value="SS">SS</button>
          <button type="button" class="ease-btn" data-value="S">S</button>
          <button type="button" class="ease-btn" data-value="A">A</button>
          <button type="button" class="ease-btn" data-value="B">B</button>
          <button type="button" class="ease-btn" data-value="C">C</button>
        </div>
        <input type="hidden" name="ease_rating" id="easeHidden">
        <p id="easeError" class="hidden mt-2 text-red-500 text-xs">楽単度を選んでください</p>
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-5">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          💬 コメント <span class="text-red-500">*</span>
        </label>
        <textarea name="comment" id="comment" rows="5"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition resize-none"
          placeholder="授業の雰囲気、テストの傾向、おすすめポイントなど自由に書いてください！"
          required maxlength="500"></textarea>
        <div class="flex justify-between items-center mt-1">
          <p class="text-xs text-gray-400">💾 入力内容は自動保存されます</p>
          <p class="text-xs text-gray-400"><span id="charCount">0</span>/500文字</p>
        </div>
      </div>

      <button type="submit" id="submitBtn"
        class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 active:scale-95 transition text-base shadow-md">
        レビューを送る ✈️
      </button>

    </form>
  </div>

  <style>
    .ease-btn {
      padding: 10px 0;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      border: 2px solid #e5e7eb;
      color: #6b7280;
      background: white;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ease-btn:active { transform: scale(0.95); }
    .ease-btn.active {
      border-color: #6366f1;
      color: #6366f1;
      background: #eef2ff;
    }
  </style>

  <script>
    const STORAGE_KEY = 'kobe_review_v1';
    const RATING_LABELS = ['', 'あまり学べなかった 😔', '少し学べた 🙂', '普通 😊', '学べた！😄', 'めちゃ学べた！🤩'];
    let currentRating = 0;

    function buildStars() {
      const c = document.getElementById('starContainer');
      c.innerHTML = '';
      for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = i <= currentRating ? '★' : '☆';
        btn.className = 'text-5xl transition-all hover:scale-110 active:scale-95 ' +
          (i <= currentRating ? 'text-yellow-400' : 'text-gray-200');
        btn.onclick = () => {
          currentRating = i;
          document.getElementById('ratingHidden').value = i;
          document.getElementById('ratingLabel').textContent = RATING_LABELS[i];
          document.getElementById('ratingError').classList.add('hidden');
          buildStars();
          saveData();
        };
        c.appendChild(btn);
      }
    }

    document.querySelectorAll('.ease-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.ease-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('easeHidden').value = btn.dataset.value;
        document.getElementById('easeError').classList.add('hidden');
        saveData();
      };
    });

    const searchInput = document.getElementById('courseSearchInput');
    const dropdown = document.getElementById('courseDropdown');
    let debounceTimer;

    searchInput.addEventListener('input', () => {
      document.getElementById('courseNameHidden').value = '';
      clearTimeout(debounceTimer);
      const q = searchInput.value.trim();
      if (!q) { dropdown.classList.add('hidden'); return; }

      debounceTimer = setTimeout(async () => {
        try {
          const res = await fetch(`/api/courses?q=${encodeURIComponent(q)}`);
          const data = await res.json();
          const items = data.courses || [];
          if (items.length === 0) {
            dropdown.innerHTML = `<div class="px-4 py-3 text-sm text-gray-500">
              一致する科目なし ―
              <span class="text-indigo-600 cursor-pointer underline" id="useAsIs">「${q}」で入力する</span>
            </div>`;
            dropdown.classList.remove('hidden');
            document.getElementById('useAsIs')?.addEventListener('click', () => selectCourse(q));
            return;
          }
          dropdown.innerHTML = items.map(name =>
            `<div class="px-4 py-3 text-sm hover:bg-indigo-50 cursor-pointer border-b border-gray-50 last:border-none font-medium" data-name="${name}">${name}</div>`
          ).join('');
          dropdown.classList.remove('hidden');
          dropdown.querySelectorAll('[data-name]').forEach(el => {
            el.addEventListener('click', () => selectCourse(el.dataset.name));
          });
        } catch (_) {}
      }, 300);
    });

    function selectCourse(name) {
      document.getElementById('courseNameHidden').value = name;
      document.getElementById('selectedCourseName').textContent = name;
      document.getElementById('selectedCourse').classList.remove('hidden');
      searchInput.classList.add('hidden');
      dropdown.classList.add('hidden');
      document.getElementById('courseError').classList.add('hidden');
      saveData();
    }

    document.getElementById('clearCourse').addEventListener('click', () => {
      document.getElementById('courseNameHidden').value = '';
      document.getElementById('selectedCourse').classList.add('hidden');
      searchInput.classList.remove('hidden');
      searchInput.value = '';
      searchInput.focus();
    });

    document.addEventListener('click', e => {
      if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.add('hidden');
      }
    });

    document.getElementById('comment').addEventListener('input', () => {
      document.getElementById('charCount').textContent = document.getElementById('comment').value.length;
      saveData();
    });
    document.getElementById('submitter_name').addEventListener('input', saveData);

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        name: document.getElementById('submitter_name').value,
        course: document.getElementById('courseNameHidden').value,
        rating: currentRating,
        ease: document.getElementById('easeHidden').value,
        comment: document.getElementById('comment').value,
      }));
    }

    function loadData() {
      try {
        const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        if (!d) return;
        if (d.name) document.getElementById('submitter_name').value = d.name;
        if (d.course) selectCourse(d.course);
        if (d.rating) {
          currentRating = d.rating;
          document.getElementById('ratingHidden').value = d.rating;
          document.getElementById('ratingLabel').textContent = RATING_LABELS[d.rating];
          buildStars();
        }
        if (d.ease) {
          document.getElementById('easeHidden').value = d.ease;
          document.querySelectorAll('.ease-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.value === d.ease);
          });
        }
        if (d.comment) {
          document.getElementById('comment').value = d.comment;
          document.getElementById('charCount').textContent = d.comment.length;
        }
      } catch (_) {}
    }

    document.getElementById('reviewForm').addEventListener('submit', e => {
      let valid = true;
      if (!document.getElementById('courseNameHidden').value.trim()) {
        document.getElementById('courseError').classList.remove('hidden');
        valid = false;
      }
      if (!document.getElementById('ratingHidden').value) {
        document.getElementById('ratingError').classList.remove('hidden');
        valid = false;
      }
      if (!document.getElementById('easeHidden').value) {
        document.getElementById('easeError').classList.remove('hidden');
        valid = false;
      }
      if (!valid) { e.preventDefault(); window.scrollTo(0, 0); return; }
      localStorage.removeItem(STORAGE_KEY);
      const btn = document.getElementById('submitBtn');
      btn.textContent = '送信中...';
      btn.disabled = true;
    });

    buildStars();
    loadData();
  </script>
</body>
</html>
